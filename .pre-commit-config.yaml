default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

ci:
  autoupdate_schedule: monthly

# cf https://pre-commit.com/#regular-expressions
exclude: |
  (?x)^(
      tests/templates/invalid.txt|
      scripts/django_tests_use_rusty_templates.patch
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: fix-byte-order-marker
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 5ba58aca0bd5bc7c0e1c0fc45af2e88d6a2bde83  # frozen: v0.14.10
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 33ae92ed9b1a4392c8ac5fdef46887640d866e1e  # frozen: 0.5.0
    hooks:
      - id: cargo-fmt
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 5ccbe86b8ad6bd7c28b6944a7553c075ae833637  # frozen: 0.9.21
    hooks:
      - id: uv-lock
      - id: uv-sync
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: ea18690d7f8e44203c9efd7bc6229447d02e3951  # frozen: v1.19.0
    hooks:
      - id: zizmor
  - repo: https://github.com/crate-ci/typos
    rev: b31d3aa6e8e43e6a9cf7a1d137baf189dec0922b  # frozen: v1
    hooks:
      - id: typos
